name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Publish (Windows x64, self-contained, single file)
        run: |
          dotnet publish GsmCalculator/GsmCalculator.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish/win-x64

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          Compress-Archive -Path publish/win-x64/* -DestinationPath "GsmCalculator-$version-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: GsmCalculator-*.zip
          generate_release_notes: true
